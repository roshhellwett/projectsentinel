<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="shape">
      <rect x="0" y="0" width="32" height="32" rx="7" ry="7"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>
  <rect x="0" y="0" width="32" height="16" rx="7" ry="7" fill="url(#glass)" clip-path="url(#shape)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" ry="6.5" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.5" fill="none"/>

  <text
    x="16"
    y="21.5"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="200"
    letter-spacing="1.5"
    fill="#ffffff"
    fill-opacity="0.92"
  >IV</text>
</svg>
