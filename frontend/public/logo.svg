<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="shape">
      <rect x="0" y="0" width="100" height="100" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Base rounded square -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Subtle glass sheen overlay on top half -->
  <rect x="0" y="0" width="100" height="50" rx="22" ry="22" fill="url(#glass)" clip-path="url(#shape)"/>

  <!-- Hairline border -->
  <rect x="0.5" y="0.5" width="99" height="99" rx="21.5" ry="21.5" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" fill="none"/>

  <!-- "IV" letterforms — ultra-light, geometric, centered -->
  <text
    x="50"
    y="66"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="40"
    font-weight="200"
    letter-spacing="4"
    fill="#ffffff"
    fill-opacity="0.92"
  >IV</text>
</svg>
