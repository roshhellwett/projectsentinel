<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <defs>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1500" height="500" fill="#ffffff"/>

  <!-- Grid overlay -->
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- ── LOGO ICON ── -->
  <rect x="120" y="170" width="160" height="160" rx="12" ry="12" fill="#fafafa" stroke="#dcdcdc" stroke-width="2"/>
  <text x="200" y="278" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="72" font-weight="700" letter-spacing="4" fill="#1a1a1a">IV</text>

  <!-- ── VERTICAL SEPARATOR ── -->
  <rect x="342" y="170" width="1" height="160" fill="#dcdcdc"/>

  <!-- ── TEXT CONTENT ── -->
  <text x="394" y="247" font-family="'Source Serif 4', Georgia, serif" font-size="76" font-weight="700" letter-spacing="-1.5" fill="#1a1a1a">India Verified</text>
  <text x="396" y="302" font-family="'Source Serif 4', Georgia, serif" font-size="28" font-weight="400" letter-spacing="0.3" fill="#5c5c5c">AI-Verified Indian News &#xB7; No Ads &#xB7; No Bias &#xB7; Open Source</text>

  <!-- ── BOTTOM-RIGHT BADGE ── -->
  <rect x="1150" y="420" width="310" height="42" rx="6" ry="6" fill="#fafafa" stroke="#dcdcdc" stroke-width="1"/>
  <text x="1305" y="446" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="400" letter-spacing="0.5" fill="#5c5c5c">zenithopensourceprojects.vercel.app</text>
</svg>
