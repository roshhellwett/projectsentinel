<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#2563eb" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FFFFFF" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#spotlight)"/>

  <!-- Massive "Verified News" watermark -->
  <text x="600" y="420" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="clamp(80px,18vw,220px)" letter-spacing="-0.04em" fill="#FFFFFF" fill-opacity="0.03" text-anchor="middle" dominant-baseline="middle">Verified News</text>

  <!-- IV Logo mark top-left -->
  <g transform="translate(60, 54)">
    <rect width="64" height="64" rx="18" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1.5"/>
    <text x="32" y="40" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="28" fill="#2563eb" text-anchor="middle" dominant-baseline="central">IV</text>
  </g>

  <!-- Main headline -->
  <g transform="translate(100, 240)">
    <text font-family="system-ui,-apple-system,sans-serif" font-size="76" font-weight="800" fill="#FFFFFF" letter-spacing="-0.03em">India Verified</text>
    <text y="72" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="500" fill="#a1a1aa">AI-Verified Indian News. No Ads. No Bias.</text>
  </g>

  <!-- Trust badges bottom-right -->
  <g transform="translate(770, 490)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
    <text x="60" y="24" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e4e4e7" text-anchor="middle" dominant-baseline="central">No Ads</text>

    <rect x="135" y="0" width="140" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
    <text x="205" y="24" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e4e4e7" text-anchor="middle" dominant-baseline="central">AI Verified</text>

    <rect x="290" y="0" width="140" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
    <text x="360" y="24" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e4e4e7" text-anchor="middle" dominant-baseline="central">Open Source</text>
  </g>

  <!-- Decorative glass card accent -->
  <g transform="translate(820, 100)">
    <rect width="280" height="340" rx="24" fill="#FFFFFF" fill-opacity="0.03" stroke="#2563eb" stroke-opacity="0.12" stroke-width="1.5"/>
    <rect x="30" y="60" width="100" height="28" rx="14" fill="#2563eb" fill-opacity="0.15"/>
    <text x="80" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#2563eb" text-anchor="middle" dominant-baseline="central">TRENDING</text>
    <rect x="30" y="110" width="220" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.6"/>
    <rect x="30" y="132" width="180" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.3"/>
    <rect x="30" y="154" width="200" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.3"/>
    <rect x="30" y="200" width="120" height="28" rx="14" fill="#22C55E" fill-opacity="0.15"/>
    <text x="90" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#22C55E" text-anchor="middle" dominant-baseline="central">High Credibility</text>
    <rect x="30" y="250" width="220" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.4"/>
    <rect x="30" y="272" width="160" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.2"/>
  </g>
</svg>