<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="shape">
      <rect x="0" y="0" width="180" height="180" rx="40" ry="40"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="180" height="180" rx="40" ry="40" fill="url(#bg)"/>
  <rect x="0" y="0" width="180" height="90" rx="40" ry="40" fill="url(#glass)" clip-path="url(#shape)"/>
  <rect x="1" y="1" width="178" height="178" rx="39" ry="39" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" fill="none"/>

  <text
    x="90"
    y="118"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="72"
    font-weight="200"
    letter-spacing="8"
    fill="#ffffff"
    fill-opacity="0.92"
  >IV</text>
</svg>
