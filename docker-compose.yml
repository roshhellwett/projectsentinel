services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: india-verified-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-https://placeholder.supabase.co}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-placeholder}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-placeholder}
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
    depends_on:
      worker:
        condition: service_started

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: india-verified-worker
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-https://placeholder.supabase.co}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-placeholder}
      - GROQ_API_KEY=${GROQ_API_KEY:-placeholder}
      - GROQ_API_KEY_VERIFY=${GROQ_API_KEY_VERIFY:-placeholder}
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - GNEWS_API_KEY=${GNEWS_API_KEY:-}
      - CORS_ORIGINS=http://localhost:3000
