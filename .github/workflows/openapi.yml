name: OpenAPI Spec Check

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
  pull_request:
    branches: [main]
    paths:
      - "worker/**"

jobs:
  validate:
    name: Validate OpenAPI schema
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export OpenAPI schema
        run: python scripts/export_openapi.py
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          GROQ_API_KEY: placeholder
          GROQ_API_KEY_VERIFY: placeholder

      - name: Check schema is valid JSON
        run: python -c "import json; json.load(open('openapi.json')); print('Valid OpenAPI schema')"

      - name: Upload schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: worker/openapi.json
